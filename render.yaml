services:
  - type: web
    name: ecommerce-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn ecommerce.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: ecommerce-db